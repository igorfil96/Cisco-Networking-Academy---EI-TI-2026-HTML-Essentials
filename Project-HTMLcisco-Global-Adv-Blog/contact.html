<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="contact-form">
        <h1>Connect With Us</h1>
        <form action="#" method="post">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="your@email.com" required><br><br>

            <label for="message">Your Story or Inquiry:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br><br>

            <button type="submit">Send Message ✈️</button>
        </form>
    </section>

    <section id="newsletter">
        <h2>Newsletter Subscription</h2>
        <form action="#" method="post">
            <label for="news-email">Subscribe to our updates:</label>
            <input type="email" id="news-email" placeholder="Enter your email address" required>
            <br>
            <input type="checkbox" id="confirm" required>
            <label for="confirm" aria-label="Confirm subscription">I want to receive the newsletter</label>
            <br>
            <button type="submit">Join Us</button>
        </form>
    </section>

    <footer>
        <nav>
            <a href="#">About Us</a> | 
            <a href="#">Privacy Policy</a> | 
            <a href="#">Terms of Use</a>
        </nav>
        <div class="social">
            <p>Find us on: 
                <a href="#" aria-label="Instadrama">Instadrama</a>, 
                <a href="#" aria-label="Tweety">Tweety</a>
            </p>
        </div>
        <p>Contact: <a href="mailto:contact@globaladventures.com">contact@globaladventures.com</a></p>
        <p>&copy; 2035 Global Adventures Blog. All rights reserved. 🗺️</p>
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Travel Gallery 📸</h1>
    <p>Dive into our visual journey across the globe. Each shot captures a unique emotion from our travels.</p>

    <section class="photo-gallery">
        <ul>
            <li>
                <figure>
                    <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=1000" alt="Kyoto temple" style="width:300px;">
                    <figcaption>The serene silence of Kyoto's golden temples. 🇯🇵</figcaption>
                </figure>
            </li>
            <li>
                <figure>
                    <img src="https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?q=80&w=1000" alt="New York City Skyline" style="width:300px;">
                    <figcaption>The electric energy of Times Square at midnight. 🗽</figcaption>
                </figure>
            </li>
            <li>
                <figure>
                    <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=1000" alt="Eiffel Tower Paris" style="width:300px;">
                    <figcaption>Picnic days under the watchful eye of the Iron Lady. 🇫🇷</figcaption>
                </figure>
            </li>
        </ul>
    </section>
</body>
</html>
